name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
            -o /dev/null -w "Status: %{http_code}\n"
